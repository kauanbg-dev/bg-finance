<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar conta - BG Finance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-brand">
      <img src="logo.png" alt="BG" class="auth-logo" />
      <div>
        <h1 class="auth-title">Criar conta</h1>
        <p class="auth-subtitle">Crie sua conta para salvar seus dados.</p>
      </div>
    </div>

    <form id="register-form" class="auth-form">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="seuemail@email.com" required />
      </div>

      <div class="field">
        <label>Senha</label>
        <input id="password" type="password" placeholder="mín. 6 caracteres" minlength="6" required />
      </div>

      <div class="field">
        <label>Confirmar senha</label>
        <input id="confirm" type="password" placeholder="repita a senha" minlength="6" required />
      </div>

      <button class="btn primary full" type="submit">Cadastrar</button>

      <div class="auth-row">
        <span style="color: rgba(255,255,255,.75); font-size: 13px;">Já tem conta?</span>
        <a class="link" href="./login.html">Fazer login</a>
      </div>

      <p id="msg" class="msg"></p>
    </form>
  </div>

  <script src="register.js"></script>
</body>
</html>
